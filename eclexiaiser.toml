# eclexiaiser manifest for cloudguard-cli

[project]
name = "cloudguard-cli"

[[functions]]
name = "main"
source = "src/lib.rs"
energy-budget-mj = 20.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
